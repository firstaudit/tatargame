<!DOCTYPE html>
<html lang="tt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Сан-Ракета — Тест звуков</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .panel {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            max-width: 500px;
            justify-content: center;
        }
        button {
            padding: 14px 20px;
            font-size: 16px;
            border: 2px solid #444;
            border-radius: 12px;
            background: #1a1a3e;
            color: #fff;
            cursor: pointer;
            touch-action: manipulation;
            min-width: 140px;
            transition: all 0.1s;
        }
        button:active {
            background: #2a2a5e;
            transform: scale(0.96);
        }
        button.gold {
            border-color: #ffaa00;
            color: #ffaa00;
        }
        h2 {
            width: 100%;
            text-align: center;
            margin: 10px 0 5px;
            color: #aaa;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .status {
            width: 100%;
            text-align: center;
            padding: 10px;
            color: #888;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="panel">
        <h2>🎮 Интерфейс</h2>
        <button onclick="playCorrect()">✅ Правильно (Дөрес!)</button>
        <button onclick="playWrong()">❌ Ошибка (Хата!)</button>
        <button onclick="playCombo()">🔥 Комбо x5</button>
        <button onclick="playComboUlt()">💎 Комбо x15</button>
        <button onclick="playNewOrbit()">🪐 Новая орбита</button>
        <button onclick="playGameOver()">💀 Game Over</button>

        <h2>🚀 Ракета</h2>
        <button onclick="playThrust()">🔥 Двигатель (loop)</button>
        <button onclick="stopThrust()">🔇 Стоп двигатель</button>
        <button onclick="playBoost()">⚡ Ускорение</button>
        <button onclick="playHit()">💥 Столкновение</button>

        <h2>🥟 Оружие</h2>
        <button onclick="playShoot()">🥟 Выстрел эчпочмак</button>
        <button onclick="playHitEchp()">🎯 Попадание</button>
        <button class="gold" onclick="playChakChak()">🍯 Чак-чак (ульта)</button>

        <h2>🎵 Музыка</h2>
        <button onclick="playMenuMusic()">🌙 Меню (lofi)</button>
        <button onclick="playPlanetMusic()">🪐 Планета 1 (бодрое)</button>
        <button onclick="stopMusic()">🔇 Стоп музыка</button>

        <h2>🌌 Атмосфера</h2>
        <button onclick="playStarDing()">⭐ Звезда</button>
        <button onclick="playAsteroidPass()">🪨 Пролёт астероида</button>
        <button onclick="playWarp()">✨ Переход</button>

        <div class="status" id="status">Готов к запуску 🚀</div>
    </div>

    <script>
        // ========== ЗВУКОВОЙ ДВИЖОК (Web Audio API) ==========
        let audioCtx = null;
        let thrustOsc = null;
        let thrustGain = null;
        let musicNodes = [];

        function getCtx() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            return audioCtx;
        }

        function status(msg) {
            document.getElementById('status').textContent = msg;
        }

        // ========== ПОМОЩНИКИ ==========
        function playTone(freq, duration, type = 'square', volume = 0.2, detune = 0) {
            const ctx = getCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);

            osc.type = type;
            osc.frequency.setValueAtTime(freq, ctx.currentTime);
            if (detune) osc.detune.setValueAtTime(detune, ctx.currentTime);

            gain.gain.setValueAtTime(volume, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + duration);
        }

        function playNoise(duration, volume = 0.15, highpass = 0) {
            const ctx = getCtx();
            const bufferSize = ctx.sampleRate * duration;
            const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }

            const source = ctx.createBufferSource();
            source.buffer = buffer;

            const gain = ctx.createGain();
            const filter = ctx.createBiquadFilter();

            source.connect(filter);
            filter.connect(gain);
            gain.connect(ctx.destination);

            filter.type = 'highpass';
            filter.frequency.setValueAtTime(highpass || 2000, ctx.currentTime);

            gain.gain.setValueAtTime(volume, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);

            source.start(ctx.currentTime);
            source.stop(ctx.currentTime + duration);
        }

        function playSequence(notes, baseTime, type = 'square', volume = 0.2) {
            const ctx = getCtx();
            notes.forEach(([freq, dur, delay]) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime + baseTime + delay);
                gain.gain.setValueAtTime(volume, ctx.currentTime + baseTime + delay);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + baseTime + delay + dur);
                osc.start(ctx.currentTime + baseTime + delay);
                osc.stop(ctx.currentTime + baseTime + delay + dur + 0.05);
            });
        }

        // ========== ИНТЕРФЕЙС ==========
        function playCorrect() {
            status('ДӨРЕС!');
            // Три восходящие ноты (курай = square wave)
            const notes = [
                [523, 0.12, 0],     // До
                [659, 0.12, 0.1],   // Ми
                [784, 0.2, 0.2]     // Соль
            ];
            playSequence(notes, 0, 'square', 0.2);
            // Лёгкий колокольчик
            setTimeout(() => playTone(1047, 0.3, 'sine', 0.1), 350);
        }

        function playWrong() {
            status('ХАТА!');
            // Две нисходящие ноты (низкая гармонь = sawtooth)
            const notes = [
                [200, 0.2, 0],
                [150, 0.3, 0.15]
            ];
            playSequence(notes, 0, 'sawtooth', 0.15);
            // Глухой удар
            setTimeout(() => playTone(60, 0.4, 'sine', 0.3), 50);
        }

        function playCombo() {
            status('Комбо x5!');
            // Варган: резкий щелчок + гул
            playTone(800, 0.05, 'square', 0.3, 50);
            playTone(200, 0.15, 'triangle', 0.15);
            setTimeout(() => playTone(1200, 0.08, 'square', 0.2, 100), 60);
        }

        function playComboUlt() {
            status('Комбо x15! ЧӘК-ЧӘК!');
            // Трель курая + колокольчик
            for (let i = 0; i < 6; i++) {
                setTimeout(() => playTone(600 + i * 100, 0.08, 'square', 0.15), i * 40);
            }
            setTimeout(() => playTone(1200, 0.5, 'sine', 0.2), 250);
            setTimeout(() => playTone(1600, 0.6, 'sine', 0.15), 350);
        }

        function playNewOrbit() {
            status('Новая орбита!');
            // Фанфара: курай + гармонь
            const notes = [
                [523, 0.15, 0], [659, 0.15, 0.15], [784, 0.15, 0.3],
                [1047, 0.4, 0.5]
            ];
            playSequence(notes, 0, 'square', 0.2);
            // Гармонь аккорд
            setTimeout(() => {
                playTone(262, 0.5, 'sawtooth', 0.1);
                playTone(330, 0.5, 'sawtooth', 0.1);
                playTone(392, 0.5, 'sawtooth', 0.1);
            }, 600);
        }

        function playGameOver() {
            status('Уен бетте...');
            // Печальный курай: три ноты вниз
            const notes = [
                [392, 0.3, 0],
                [330, 0.3, 0.3],
                [262, 0.5, 0.6]
            ];
            playSequence(notes, 0, 'square', 0.15);
            setTimeout(() => playTone(131, 1, 'sine', 0.1), 1000);
        }

        // ========== РАКЕТА ==========
        function playThrust() {
            status('Двигатель работает...');
            const ctx = getCtx();
            stopThrust();

            thrustOsc = ctx.createOscillator();
            const noiseGain = ctx.createGain();
            thrustGain = ctx.createGain();

            // Основной гул (sawtooth + LFO)
            const lfo = ctx.createOscillator();
            const lfoGain = ctx.createGain();
            lfo.frequency.setValueAtTime(3, ctx.currentTime);
            lfoGain.gain.setValueAtTime(15, ctx.currentTime);
            lfo.connect(lfoGain);
            lfoGain.connect(thrustOsc.frequency);
            lfo.start();

            thrustOsc.type = 'sawtooth';
            thrustOsc.frequency.setValueAtTime(80, ctx.currentTime);

            // Шум (варган-подобный)
            const noise = ctx.createOscillator();
            noise.type = 'square';
            noise.frequency.setValueAtTime(120, ctx.currentTime);

            thrustOsc.connect(thrustGain);
            noise.connect(thrustGain);
            thrustGain.connect(ctx.destination);

            thrustGain.gain.setValueAtTime(0.08, ctx.currentTime);

            thrustOsc.start();
            noise.start();
        }

        function stopThrust() {
            if (thrustOsc && thrustGain) {
                thrustGain.gain.exponentialRampToValueAtTime(0.001, getCtx().currentTime + 0.3);
                setTimeout(() => {
                    try { thrustOsc.stop(); } catch(e) {}
                    thrustOsc = null;
                    thrustGain = null;
                }, 350);
            }
            status('Двигатель заглушен');
        }

        function playBoost() {
            status('Ускорение!');
            const ctx = getCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(300, ctx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.15, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.5);
            // Гармонь аккорд
            setTimeout(() => playTone(200, 0.3, 'sawtooth', 0.1), 100);
        }

        function playHit() {
            status('Столкновение!');
            playNoise(0.3, 0.25, 500);
            playTone(50, 0.4, 'sine', 0.4);
            playTone(30, 0.5, 'triangle', 0.3);
        }

        // ========== ОРУЖИЕ ==========
        function playShoot() {
            status('Эчпочмак летит!');
            // 8-bit выстрел
            const ctx = getCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(600, ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(200, ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.15, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 0.15);
            playNoise(0.08, 0.1, 4000);
        }

        function playHitEchp() {
            status('Попадание!');
            playNoise(0.1, 0.15, 3000);
            playTone(300, 0.1, 'square', 0.2);
            // Крошки (короткие щелчки)
            for (let i = 0; i < 5; i++) {
                setTimeout(() => playTone(2000 + i * 300, 0.03, 'square', 0.08), i * 15);
            }
        }

        function playChakChak() {
            status('ЧӘК-ЧӘК! ЗОЛОТО!');
            const ctx = getCtx();

            // Вжух (sweep up)
            const sweep = ctx.createOscillator();
            const sweepGain = ctx.createGain();
            sweep.connect(sweepGain);
            sweepGain.connect(ctx.destination);
            sweep.type = 'sawtooth';
            sweep.frequency.setValueAtTime(150, ctx.currentTime);
            sweep.frequency.exponentialRampToValueAtTime(2000, ctx.currentTime + 0.6);
            sweepGain.gain.setValueAtTime(0.2, ctx.currentTime);
            sweepGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.7);
            sweep.start(ctx.currentTime);
            sweep.stop(ctx.currentTime + 0.7);

            // Золотой перезвон (shimmer)
            for (let i = 0; i < 12; i++) {
                setTimeout(() => {
                    playTone(800 + Math.random() * 800, 0.3 + Math.random() * 0.5, 'sine', 0.08);
                }, i * 80);
            }

            // Глубокий гул (медовый)
            setTimeout(() => {
                const hum = ctx.createOscillator();
                const humGain = ctx.createGain();
                hum.connect(humGain);
                humGain.connect(ctx.destination);
                hum.type = 'sine';
                hum.frequency.setValueAtTime(60, ctx.currentTime);
                humGain.gain.setValueAtTime(0.15, ctx.currentTime);
                humGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 2);
                hum.start(ctx.currentTime);
                hum.stop(ctx.currentTime + 2);
            }, 400);
        }

        // ========== МУЗЫКА ==========
        // ========== МУЗЫКА (МИНИМАЛИСТИЧНАЯ) ==========
let musicInterval = null;

function stopAllMusic() {
    if (musicInterval) {
        clearInterval(musicInterval);
        musicInterval = null;
    }
    musicNodes.forEach(n => {
        try { n.stop(); } catch(e) {}
    });
    musicNodes = [];
}

function playMenuMusic() {
    status('🎵 Меню: lofi пульс');
    stopAllMusic();
    const ctx = getCtx();
    const bpm = 60; // очень медленно
    const beat = 60 / bpm;

    // Только бас-пульс: глухой удар раз в 2 секунды
    const bassNotes = [55, 55, 55, 49, 55, 55, 55, 44]; // 4 такта
    let step = 0;

    musicInterval = setInterval(() => {
        const freq = bassNotes[step % bassNotes.length];
        // Бас
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(80, ctx.currentTime);
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.5);
        musicNodes.push(osc);

        // Редкий варган (каждые 4 удара)
        if (step % 4 === 0) {
            const twang = ctx.createOscillator();
            const twGain = ctx.createGain();
            twang.connect(twGain);
            twGain.connect(ctx.destination);
            twang.type = 'triangle';
            twang.frequency.setValueAtTime(120 + Math.random() * 30, ctx.currentTime);
            twang.frequency.exponentialRampToValueAtTime(60, ctx.currentTime + 0.3);
            twGain.gain.setValueAtTime(0.04, ctx.currentTime);
            twGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
            twang.start(ctx.currentTime);
            twang.stop(ctx.currentTime + 0.3);
            musicNodes.push(twang);
        }

        // Очень редкий курай (каждые 8 ударов)
        if (step % 8 === 0) {
            const kurai = ctx.createOscillator();
            const kGain = ctx.createGain();
            const kFilter = ctx.createBiquadFilter();
            kurai.connect(kFilter);
            kFilter.connect(kGain);
            kGain.connect(ctx.destination);
            kurai.type = 'square';
            kFilter.type = 'lowpass';
            kFilter.frequency.setValueAtTime(600, ctx.currentTime);
            kurai.frequency.setValueAtTime(392, ctx.currentTime); // Соль
            kGain.gain.setValueAtTime(0.03, ctx.currentTime);
            kGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.5);
            kurai.start(ctx.currentTime);
            kurai.stop(ctx.currentTime + 1.5);
            musicNodes.push(kurai);
        }

        step++;
    }, beat * 1000);
}

function playPlanetMusic() {
    status('🎵 Планета: пульс + варган');
    stopAllMusic();
    const ctx = getCtx();
    const bpm = 75; // чуть быстрее
    const beat = 60 / bpm;

    let step = 0;
    musicInterval = setInterval(() => {
        // Бас-пульс чаще
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        const filter = ctx.createBiquadFilter();
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'triangle';
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(100, ctx.currentTime);
        osc.frequency.setValueAtTime(50, ctx.currentTime);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.3);
        musicNodes.push(osc);

        // Варган чаще (каждые 2 удара)
        if (step % 2 === 0) {
            const twang = ctx.createOscillator();
            const twGain = ctx.createGain();
            twang.connect(twGain);
            twGain.connect(ctx.destination);
            twang.type = 'triangle';
            const twFreq = 100 + step * 7;
            twang.frequency.setValueAtTime(twFreq % 80 + 80, ctx.currentTime);
            twang.frequency.linearRampToValueAtTime(40, ctx.currentTime + 0.4);
            twGain.gain.setValueAtTime(0.05, ctx.currentTime);
            twGain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
            twang.start(ctx.currentTime);
            twang.stop(ctx.currentTime + 0.4);
            musicNodes.push(twang);
        }

        step++;
    }, beat * 1000);
}

        function stopMusic() {
            stopAllMusic();
            status('🔇 Музыка остановлена');
        }

        // ========== АТМОСФЕРА ==========
        function playStarDing() {
            // Редкий звёздный «дзынь»
            playTone(1200 + Math.random() * 800, 0.2, 'sine', 0.04);
        }

        function playAsteroidPass() {
            status('Пролёт астероида');
            const ctx = getCtx();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(30, ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(15, ctx.currentTime + 1);
            gain.gain.setValueAtTime(0.1, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.3);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1);
            osc.start(ctx.currentTime);
            osc.stop(ctx.currentTime + 1);
        }

        function playWarp() {
            status('Переход!');
            const ctx = getCtx();
            for (let i = 0; i < 5; i++) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                const startFreq = 200 + i * 100;
                osc.frequency.setValueAtTime(startFreq, ctx.currentTime + i * 0.08);
                osc.frequency.exponentialRampToValueAtTime(startFreq * 3, ctx.currentTime + i * 0.08 + 0.3);
                gain.gain.setValueAtTime(0.1, ctx.currentTime + i * 0.08);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.08 + 0.3);
                osc.start(ctx.currentTime + i * 0.08);
                osc.stop(ctx.currentTime + i * 0.08 + 0.3);
            }
            playNoise(0.4, 0.1, 3000);
        }

        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        // Разблокируем AudioContext по первому клику (требование браузеров)
        document.addEventListener('click', () => {
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }, { once: true });

        status('Нажми любую кнопку для теста звуков 🎧');
        console.log('🚀 Сан-Ракета — звуковой прототип готов');
        console.log('Жми кнопки, слушай звуки');
    </script>
</body>
</html>
