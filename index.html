<!DOCTYPE html>
<html lang="tt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Сан-Ракета</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body {
            width:100%; height:100%; overflow:hidden; background:#000;
            font-family:Arial,sans-serif;
            touch-action:manipulation; -webkit-tap-highlight-color:transparent;
            user-select:none; -webkit-user-select:none;
            position:fixed; top:0; left:0;
        }
        #gc {
            position:absolute; top:0; left:0; width:100%; height:100%; overflow:hidden;
        }
        canvas {
            display:block; position:absolute; top:0; left:0; width:100%; height:100%;
        }
    </style>
</head>
<body>
    <div id="gc"><canvas id="g"></canvas></div>
    <script>
        const canvas = document.getElementById('g');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('gc');
        
        const DW = 375, DH = 667;
        let sx = 1, sy = 1, gw = DW, gh = DH;
        
        function resize() {
            const r = container.getBoundingClientRect();
            const s = Math.min(r.width / DW, r.height / DH);
            gw = Math.floor(DW * s); gh = Math.floor(DH * s);
            canvas.width = gw; canvas.height = gh;
            canvas.style.width = gw + 'px'; canvas.style.height = gh + 'px';
            canvas.style.left = ((r.width - gw) / 2) + 'px';
            canvas.style.top = ((r.height - gh) / 2) + 'px';
            sx = gw / DW; sy = gh / DH;
        }
        resize();
        window.addEventListener('resize', resize);
        window.addEventListener('orientationchange', () => setTimeout(resize, 100));
        
        const STATE = { MENU: 0, PLAY: 1, OVER: 2 };
        let state = STATE.MENU;
        let score = 0, combo = 0, maxCombo = 0, lives = 3, echp = 3, chak = 0, spd = 1, fc = 0;
        
        const rocket = {
            x: 0, y: 0, w: 24, h: 48,
            fn: 20, fb: 40, cf: 20, tf: 20, sh: 0, inv: false, invt: 0
        };
        
        let stars = [];
        for (let i = 0; i < 50; i++) {
            stars.push({
                x: Math.random() * DW, y: Math.random() * DH,
                s: Math.random() * 2 + 0.5, sp: Math.random() * 1.5 + 0.3,
                tw: Math.random() * 6.28, tws: Math.random() * 0.03 + 0.01
            });
        }
        
        let asts = [];
        const ASI = 90;
        let astt = 0;
        
        function genEx() {
            const a = Math.floor(Math.random() * 9) + 2;
            const b = Math.floor(Math.random() * 9) + 2;
            const ca = a * b;
            const wa = new Set(); wa.add(ca);
            while (wa.size < 4) {
                let w;
                const r = Math.random();
                if (r < 0.4) w = ca + Math.floor(Math.random() * 10) - 5;
                else if (r < 0.7) w = (a - 1) * b || (a + 1) * b || a * (b + 1) || a * (b - 1);
                else w = Math.floor(Math.random() * 81) + 4;
                if (w !== ca && w > 0 && w < 100) wa.add(w);
            }
            const ans = [...wa];
            for (let i = ans.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [ans[i], ans[j]] = [ans[j], ans[i]];
            }
            return {
                a, b, txt: `${a} × ${b}`, cor: ca, ans,
                cur: false, x: Math.random() * (DW - 100) + 50, y: -50,
                r: 28, sp: 1.0 + Math.random() * 0.4, act: true, ha: 0, ma: 0
            };
        }
        
        let proj = [], parts = [], fts = [];
        
        function spP(x, y, c, n = 10) {
            for (let i = 0; i < n; i++) {
                const a = Math.random() * 6.28;
                const s = Math.random() * 3 + 1;
                parts.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, l: 1, d: 0.03, c, s: Math.random() * 2 + 1 });
            }
        }
        function spF(x, y, t, c = '#fff') { fts.push({ x, y, t, l: 1, d: 0.015, c, vy: -2 }); }
        
        // Кнопки — побольше, поудобнее для тапа
        const BH = 52, BG = 8, BCOLS = 2, BBM = 20;
        function getBR(i) {
            const tw = DW * 0.9;
            const sx2 = (DW - tw) / 2;
            const bw = (tw - BG * (BCOLS - 1)) / BCOLS;
            const sy2 = DH - (BH * 2 + BG + BBM);
            return {
                x: sx2 + (i % BCOLS) * (bw + BG),
                y: sy2 + Math.floor(i / BCOLS) * (BH + BG),
                w: bw, h: BH
            };
        }
        function getEB() { const w = 48, h = 40; return { x: DW - w - 10, y: DH - BH * 2 - BG - BBM - h - 10, w, h }; }
        function getCB() { const w = 48, h = 40; const eb = getEB(); return { x: eb.x, y: eb.y - h - 8, w, h }; }
        
        function asgnC() {
            for (let a of asts) a.cur = false;
            let cl = null, cd = Infinity;
            for (let a of asts) {
                if (!a.act || a.ha > 0 || a.ma > 0) continue;
                const d = Math.sqrt((a.x - rocket.x) ** 2 + (a.y - rocket.y) ** 2);
                if (d < cd) { cd = d; cl = a; }
            }
            if (cl) cl.cur = true;
        }
        function spw() { if (asts.length < 4) { const e = genEx(); if (!asts.some(a => a.cur && a.act)) e.cur = true; asts.push(e); } }
        
        function ans(i) {
            const c = asts.find(a => a.cur && a.act);
            if (!c) return;
            if (c.ans[i] === c.cor) {
                combo++; if (combo > maxCombo) maxCombo = combo;
                score += combo >= 10 ? 30 : combo >= 5 ? 20 : 10;
                spd = Math.min(4, 1 + Math.floor(combo / 3) * 0.2);
                spP(c.x, c.y, '#FFD700', 15);
                spF(c.x, c.y, `+${combo >= 10 ? 30 : combo >= 5 ? 20 : 10}`, '#FFD700');
                if (combo % 3 === 0 && echp < 5) { echp++; spF(rocket.x - 30, rocket.y, '+🥟', '#fa0'); }
                if (combo % 8 === 0 && chak < 5) {
                    chak++; spF(rocket.x + 30, rocket.y, '+🍯!', '#f60');
                    rocket.inv = true; rocket.invt = 60;
                    for (let j = 0; j < 30; j++) parts.push({ x: rocket.x, y: rocket.y, vx: (Math.random() - 0.5) * 8, vy: (Math.random() - 0.5) * 8, l: 1, d: 0.02, c: '#f60', s: Math.random() * 4 + 2 });
                }
                c.act = false; c.cur = false; c.ha = 12;
                rocket.tf = rocket.fb; rocket.sh = 4;
            } else {
                combo = 0; lives--; spd = Math.max(1, spd - 0.5);
                spP(c.x, c.y, '#f44', 8);
                spF(c.x, c.y, 'ХАТА!', '#f44');
                c.ma = 12; rocket.sh = 6; rocket.tf = rocket.fn / 2;
                if (lives <= 0) { state = STATE.OVER; spP(rocket.x, rocket.y, '#f44', 30); return; }
            }
            asgnC();
        }
        
        function fire() {
            if (echp <= 0) return;
            const c = asts.find(a => a.cur && a.act);
            if (!c) return;
            echp--;
            const tgt = c;
            proj.push({ x: rocket.x, y: rocket.y - rocket.h / 2, tx: tgt.x, ty: tgt.y, p: 0, sp: 0.07, s: 10, tr: [] });
            setTimeout(() => {
                if (tgt && tgt.act) {
                    combo++; if (combo > maxCombo) maxCombo = combo;
                    score += 15;
                    spP(tgt.x, tgt.y, '#fa0', 20);
                    spF(tgt.x, tgt.y, '+15 🥟', '#fa0');
                    if (combo % 8 === 0 && chak < 5) { chak++; spF(rocket.x + 30, rocket.y, '+🍯!', '#f60'); rocket.inv = true; rocket.invt = 60; }
                    tgt.act = false; tgt.cur = false; tgt.ha = 12;
                    asgnC();
                }
            }, 400);
        }
        
        function ult() {
            if (chak <= 0) return;
            chak--;
            const cnt = asts.length;
            for (let a of asts) { spP(a.x, a.y, '#f80', 20); a.act = false; a.cur = false; a.ha = 12; }
            score += cnt * 20; combo += cnt; if (combo > maxCombo) maxCombo = combo;
            spF(DW / 2, DH / 2, 'ЧӘК-ЧӘК!', '#f60');
            rocket.inv = true; rocket.invt = 90;
            for (let i = 0; i < 60; i++) parts.push({ x: Math.random() * DW, y: Math.random() * DH, vx: (Math.random() - 0.5) * 6, vy: (Math.random() - 0.5) * 6, l: 1, d: 0.015, c: Math.random() > 0.5 ? '#f80' : '#fa0', s: Math.random() * 5 + 2 });
            spw(); asgnC();
        }
        
        function getDC(cx, cy) {
            const r = canvas.getBoundingClientRect();
            return { x: (cx - r.left) / sx, y: (cy - r.top) / sy };
        }
        
        function click(cx, cy) {
            const { x, y } = getDC(cx, cy);
            if (state === STATE.MENU) { start(); return; }
            if (state === STATE.OVER) {
                const b = canvas._gobtn;
                if (b && x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) start();
                return;
            }
            if (state !== STATE.PLAY) return;
            
            const c = asts.find(a => a.cur && a.act);
            if (c) {
                for (let i = 0; i < c.ans.length; i++) {
                    const b = getBR(i);
                    if (x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h) { ans(i); return; }
                }
            }
            
            if (echp > 0) { const eb = getEB(); if (x >= eb.x && x <= eb.x + eb.w && y >= eb.y && y <= eb.y + eb.h) { fire(); return; } }
            if (chak > 0) { const cb = getCB(); if (x >= cb.x && x <= cb.x + cb.w && y >= cb.y && y <= cb.y + cb.h) { ult(); return; } }
        }
        
        canvas.addEventListener('click', e => click(e.clientX, e.clientY));
        canvas.addEventListener('touchstart', e => { e.preventDefault(); if (e.touches.length) click(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
        
        function start() {
            score = 0; combo = 0; maxCombo = 0; lives = 3; echp = 3; chak = 0; spd = 1;
            asts = []; proj = []; parts = []; fts = []; astt = 0;
            rocket.x = DW / 2; rocket.y = DH * 0.5;
            rocket.cf = rocket.fn; rocket.tf = rocket.fn; rocket.sh = 0;
            rocket.inv = false; rocket.invt = 0;
            for (let s of stars) s.y = Math.random() * DH;
            spw(); asgnC();
            state = STATE.PLAY;
        }
        
        function upd() {
            if (state !== STATE.PLAY && state !== STATE.OVER) return;
            fc++;
            const eff = spd;
            
            if (rocket.inv) { rocket.invt--; if (rocket.invt <= 0) rocket.inv = false; }
            
            for (let s of stars) { s.y += s.sp * eff; s.tw += s.tws; if (s.y > DH + 10) { s.y = -10; s.x = Math.random() * DW; } }
            
            rocket.cf += (rocket.tf - rocket.cf) * 0.2;
            if (rocket.sh > 0) rocket.sh *= 0.8;
            if (rocket.sh < 0.1) rocket.sh = 0;
            rocket.x = DW / 2 + (Math.random() - 0.5) * rocket.sh;
            if (rocket.tf > rocket.fn) rocket.tf += (rocket.fn - rocket.tf) * 0.1;
            
            if (state === STATE.OVER) { rocket.y += 2; rocket.tf = 0; return; }
            
            astt++;
            if (astt >= ASI / eff) { astt = 0; if (asts.length < 3) spw(); }
            
            for (let i = asts.length - 1; i >= 0; i--) {
                const a = asts[i];
                if (a.act) {
                    a.y += a.sp * eff;
                    const d = Math.sqrt((a.x - rocket.x) ** 2 + (a.y - rocket.y) ** 2);
                    if (d < a.r + rocket.w / 2 + 5 && a.ha === 0 && a.ma === 0) {
                        if (rocket.inv) {
                            spP(a.x, a.y, '#f80', 10);
                            a.act = false; a.cur = false; a.ha = 8; asts.splice(i, 1);
                            score += 5; spF(a.x, a.y, 'ОТБИТ!', '#f60');
                            asgnC(); continue;
                        }
                        combo = 0; lives--; spd = Math.max(1, spd - 0.5);
                        spP(a.x, a.y, '#f44', 15);
                        spF(rocket.x, rocket.y, 'БӘРЕЛДЕК!', '#f44');
                        a.act = false; a.cur = false; asts.splice(i, 1);
                        rocket.sh = 8; asgnC();
                        if (lives <= 0) { state = STATE.OVER; spP(rocket.x, rocket.y, '#f44', 30); return; }
                        continue;
                    }
                    if (a.y > DH + 80) { a.cur = false; asts.splice(i, 1); spw(); asgnC(); }
                } else {
                    if (a.ha > 0) a.ha--;
                    if (a.ma > 0) a.ma--;
                    if (a.ha <= 0 && a.ma <= 0) asts.splice(i, 1);
                }
            }
            
            proj = proj.filter(p => { p.p += p.sp; return p.p < 1; });
            parts = parts.filter(p => { p.x += p.vx; p.y += p.vy; p.l -= p.d; return p.l > 0; });
            fts = fts.filter(t => { t.y += t.vy; t.l -= t.d; return t.l > 0; });
        }
        
        function draw() {
            ctx.clearRect(0, 0, gw, gh);
            
            const grd = ctx.createLinearGradient(0, 0, 0, DH);
            grd.addColorStop(0, '#05051a'); grd.addColorStop(0.5, '#0a0a2e'); grd.addColorStop(1, '#1a1a3e');
            ctx.fillStyle = grd; ctx.fillRect(0, 0, DW, DH);
            
            for (let s of stars) {
                ctx.fillStyle = `rgba(255,255,255,${0.5 + Math.sin(s.tw) * 0.3 + 0.1})`;
                ctx.beginPath(); ctx.arc(s.x, s.y, s.s, 0, 6.28); ctx.fill();
            }
            
            const ey = DH + 30;
            const eg = ctx.createRadialGradient(DW / 2, ey, 10, DW / 2, ey, DW * 1.2);
            eg.addColorStop(0, '#2d5a1e'); eg.addColorStop(0.7, '#1a3a10'); eg.addColorStop(1, '#0a0a1a');
            ctx.fillStyle = eg; ctx.beginPath(); ctx.arc(DW / 2, ey, DW * 1.2, 0, 3.14); ctx.fill();
            
            for (let a of asts) {
                if (!a.act && a.ha <= 0 && a.ma <= 0) continue;
                let al = 1, sc = 1;
                if (a.ha > 0) { al = a.ha / 12; sc = 1 + (12 - a.ha) * 0.08; }
                if (a.ma > 0) al = a.ma / 12;
                if (al <= 0) continue;
                
                ctx.save(); ctx.globalAlpha = al; ctx.translate(a.x, a.y); ctx.scale(sc, sc);
                
                ctx.fillStyle = '#5a5a6e'; ctx.strokeStyle = '#7a7a8e'; ctx.lineWidth = 2;
                ctx.beginPath();
                for (let i = 0; i < 8; i++) {
                    const ang = (i / 8) * 6.28;
                    const rr = a.r + Math.sin(i * 1.7 + fc * 0.05) * 3;
                    const sx2 = Math.cos(ang) * rr, sy2 = Math.sin(ang) * rr;
                    i === 0 ? ctx.moveTo(sx2, sy2) : ctx.lineTo(sx2, sy2);
                }
                ctx.closePath(); ctx.fill(); ctx.stroke();
                
                ctx.fillStyle = '#4a4a5e';
                ctx.beginPath(); ctx.arc(-6, -4, 4, 0, 6.28); ctx.fill();
                ctx.beginPath(); ctx.arc(3, 6, 3, 0, 6.28); ctx.fill();
                
                ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(a.txt, 0, 0);
                
                // Если текущий — подсветка
                if (a.cur && a.act) {
                    ctx.strokeStyle = 'rgba(255,200,50,0.6)'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(0, 0, a.r + 6, 0, 6.28); ctx.stroke();
                }
                
                ctx.restore();
            }
            
            for (let p of proj) {
                const cx = p.x + (p.tx - p.x) * p.p;
                const cy = p.y + (p.ty - p.y) * p.p;
                ctx.fillStyle = '#fa0'; ctx.strokeStyle = '#c80'; ctx.lineWidth = 1.5;
                ctx.save(); ctx.translate(cx, cy);
                ctx.rotate(Math.atan2(p.ty - p.y, p.tx - p.x) + 1.57);
                ctx.beginPath();
                ctx.moveTo(0, -p.s); ctx.lineTo(-p.s * 0.7, p.s * 0.6); ctx.lineTo(p.s * 0.7, p.s * 0.6);
                ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.restore();
            }
            
            for (let p of parts) {
                ctx.globalAlpha = p.l;
                ctx.fillStyle = p.c;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s * p.l, 0, 6.28); ctx.fill();
            }
            ctx.globalAlpha = 1;
            
            // Ракета
            if (state !== STATE.OVER || rocket.y < DH + 100) {
                ctx.save(); ctx.translate(rocket.x, rocket.y);
                
                if (rocket.inv) {
                    ctx.shadowColor = '#f60'; ctx.shadowBlur = 15;
                }
                
                const fh = rocket.cf + Math.sin(fc * 0.3) * 4;
                if (fh > 2) {
                    const fg = ctx.createLinearGradient(0, rocket.h / 2, 0, rocket.h / 2 + fh);
                    fg.addColorStop(0, '#f40'); fg.addColorStop(0.3, '#f60'); fg.addColorStop(0.6, '#fa0'); fg.addColorStop(1, 'rgba(255,200,50,0)');
                    ctx.fillStyle = fg;
                    ctx.beginPath();
                    const fw = rocket.w * 0.4, wb = Math.sin(fc * 0.5) * 2;
                    ctx.moveTo(-fw, rocket.h / 2);
                    ctx.quadraticCurveTo(-fw + wb, rocket.h / 2 + fh * 0.6, wb * 0.5, rocket.h / 2 + fh);
                    ctx.quadraticCurveTo(fw + wb * 0.5, rocket.h / 2 + fh * 0.6, fw, rocket.h / 2);
                    ctx.closePath(); ctx.fill();
                }
                
                const bg = ctx.createLinearGradient(-rocket.w / 2, 0, rocket.w / 2, 0);
                bg.addColorStop(0, '#c0c0c0'); bg.addColorStop(0.3, '#fff'); bg.addColorStop(0.7, '#e0e0e0'); bg.addColorStop(1, '#909090');
                ctx.fillStyle = bg; ctx.strokeStyle = '#707070'; ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(0, -rocket.h / 2);
                ctx.bezierCurveTo(rocket.w / 2, -rocket.h / 2, rocket.w / 2, rocket.h / 2, rocket.w * 0.3, rocket.h / 2);
                ctx.lineTo(-rocket.w * 0.3, rocket.h / 2);
                ctx.bezierCurveTo(-rocket.w / 2, rocket.h / 2, -rocket.w / 2, -rocket.h / 2, 0, -rocket.h / 2);
                ctx.closePath(); ctx.fill(); ctx.stroke();
                
                ctx.fillStyle = '#48c'; ctx.strokeStyle = '#a0a0a0'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(0, -5, rocket.w * 0.22, 0, 6.28); ctx.fill(); ctx.stroke();
                ctx.fillStyle = 'rgba(255,255,255,0.4)'; ctx.beginPath(); ctx.arc(-2, -7, 2.5, 0, 6.28); ctx.fill();
                
                ctx.fillStyle = '#a0a0a0'; ctx.strokeStyle = '#606060'; ctx.lineWidth = 1;
                ctx.beginPath(); ctx.moveTo(-rocket.w * 0.3, rocket.h * 0.25); ctx.lineTo(-rocket.w * 0.8, rocket.h * 0.45); ctx.lineTo(-rocket.w * 0.35, rocket.h * 0.45); ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(rocket.w * 0.3, rocket.h * 0.25); ctx.lineTo(rocket.w * 0.8, rocket.h * 0.45); ctx.lineTo(rocket.w * 0.35, rocket.h * 0.45); ctx.closePath(); ctx.fill(); ctx.stroke();
                
                ctx.fillStyle = '#d33'; ctx.strokeStyle = '#a22';
                ctx.beginPath();
                ctx.moveTo(0, -rocket.h / 2);
                ctx.bezierCurveTo(rocket.w * 0.15, -rocket.h / 2 + 8, rocket.w * 0.35, -rocket.h * 0.25, rocket.w * 0.3, -rocket.h * 0.15);
                ctx.lineTo(-rocket.w * 0.3, -rocket.h * 0.15);
                ctx.bezierCurveTo(-rocket.w * 0.35, -rocket.h * 0.25, -rocket.w * 0.15, -rocket.h / 2 + 8, 0, -rocket.h / 2);
                ctx.closePath(); ctx.fill(); ctx.stroke();
                
                ctx.restore();
            }
            
            // Текст
            for (let t of fts) {
                ctx.globalAlpha = t.l;
                ctx.fillStyle = t.c;
                ctx.font = 'bold 16px Arial'; ctx.textAlign = 'center';
                ctx.fillText(t.t, t.x, t.y);
            }
            ctx.globalAlpha = 1;
            
            // HUD
            ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, DW, 40);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 15px Arial'; ctx.textAlign = 'left';
            ctx.fillText(`${score}`, 10, 27);
            
            if (combo >= 3) { ctx.fillStyle = '#fa0'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center'; ctx.fillText(`x${combo}`, DW / 2, 27); }
            
            if (rocket.inv) { ctx.fillStyle = '#f60'; ctx.font = 'bold 10px Arial'; ctx.textAlign = 'center'; ctx.fillText('ИМБА!', DW / 2, 14); }
            
            ctx.textAlign = 'right'; ctx.font = '17px Arial';
            let hearts = '';
            for (let i = 0; i < lives; i++) hearts += '❤️';
            for (let i = lives; i < 3; i++) hearts += '🖤';
            ctx.fillText(hearts, DW - 10, 27);
            
            // Кнопки
            const cur = asts.find(a => a.cur && a.act);
            if (state === STATE.PLAY && cur) {
                for (let i = 0; i < cur.ans.length; i++) {
                    const b = getBR(i);
                    const bg2 = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
                    bg2.addColorStop(0, '#3a3a5a'); bg2.addColorStop(1, '#2a2a4a');
                    ctx.fillStyle = bg2;
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2;
                    ctx.beginPath();
                    const r2 = 12;
                    ctx.moveTo(b.x + r2, b.y); ctx.lineTo(b.x + b.w - r2, b.y);
                    ctx.quadraticCurveTo(b.x + b.w, b.y, b.x + b.w, b.y + r2);
                    ctx.lineTo(b.x + b.w, b.y + b.h - r2);
                    ctx.quadraticCurveTo(b.x + b.w, b.y + b.h, b.x + b.w - r2, b.y + b.h);
                    ctx.lineTo(b.x + r2, b.y + b.h);
                    ctx.quadraticCurveTo(b.x, b.y + b.h, b.x, b.y + b.h - r2);
                    ctx.lineTo(b.x, b.y + r2);
                    ctx.quadraticCurveTo(b.x, b.y, b.x + r2, b.y);
                    ctx.closePath(); ctx.fill(); ctx.stroke();
                    
                    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(cur.ans[i], b.x + b.w / 2, b.y + b.h / 2);
                }
            }
            
            if (echp > 0 && state === STATE.PLAY) {
                const eb = getEB();
                ctx.fillStyle = 'rgba(255,150,30,0.5)'; ctx.strokeStyle = 'rgba(255,180,60,0.7)'; ctx.lineWidth = 2;
                ctx.beginPath();
                const r2 = 8;
                ctx.moveTo(eb.x + r2, eb.y); ctx.lineTo(eb.x + eb.w - r2, eb.y);
                ctx.quadraticCurveTo(eb.x + eb.w, eb.y, eb.x + eb.w, eb.y + r2);
                ctx.lineTo(eb.x + eb.w, eb.y + eb.h - r2);
                ctx.quadraticCurveTo(eb.x + eb.w, eb.y + eb.h, eb.x + eb.w - r2, eb.y + eb.h);
                ctx.lineTo(eb.x + r2, eb.y + eb.h);
                ctx.quadraticCurveTo(eb.x, eb.y + eb.h, eb.x, eb.y + eb.h - r2);
                ctx.lineTo(eb.x, eb.y + r2);
                ctx.quadraticCurveTo(eb.x, eb.y, eb.x + r2, eb.y);
                ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#fff'; ctx.font = '14px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(`🥟×${echp}`, eb.x + eb.w / 2, eb.y + eb.h / 2);
            }
            
            if (chak > 0 && state === STATE.PLAY) {
                const cb = getCB();
                const pls = Math.sin(fc * 0.08) * 0.2 + 0.8;
                ctx.fillStyle = `rgba(255,140,0,${0.5 * pls})`; ctx.strokeStyle = 'rgba(255,200,60,0.9)'; ctx.lineWidth = 2;
                ctx.beginPath();
                const r2 = 8;
                ctx.moveTo(cb.x + r2, cb.y); ctx.lineTo(cb.x + cb.w - r2, cb.y);
                ctx.quadraticCurveTo(cb.x + cb.w, cb.y, cb.x + cb.w, cb.y + r2);
                ctx.lineTo(cb.x + cb.w, cb.y + cb.h - r2);
                ctx.quadraticCurveTo(cb.x + cb.w, cb.y + cb.h, cb.x + cb.w - r2, cb.y + cb.h);
                ctx.lineTo(cb.x + r2, cb.y + cb.h);
                ctx.quadraticCurveTo(cb.x, cb.y + cb.h, cb.x, cb.y + cb.h - r2);
                ctx.lineTo(cb.x, cb.y + r2);
                ctx.quadraticCurveTo(cb.x, cb.y, cb.x + r2, cb.y);
                ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText(`🍯×${chak}`, cb.x + cb.w / 2, cb.y + cb.h / 2);
            }
            
            if (state === STATE.MENU) {
                ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 0, DW, DH);
                ctx.fillStyle = '#fff'; ctx.font = 'bold 32px Arial'; ctx.textAlign = 'center';
                ctx.fillText('САН-РАКЕТА', DW / 2, DH * 0.26);
                ctx.fillStyle = '#fa0'; ctx.font = '16px Arial';
                ctx.fillText('Тапкырлау', DW / 2, DH * 0.26 + 30);
                ctx.fillStyle = '#ccc'; ctx.font = '12px Arial';
                ctx.fillText('Решай примеры — лети к звёздам!', DW / 2, DH * 0.40);
                ctx.fillText('🥟 серия из 3  |  🍯 серия из 8', DW / 2, DH * 0.45);
                
                const bw = 180, bh = 54;
                const bx = DW / 2 - bw / 2, by = DH * 0.55;
                const pulse = Math.sin(fc * 0.05) * 0.15 + 0.85;
                ctx.fillStyle = `rgba(255,140,0,${pulse})`; ctx.strokeStyle = '#fa0'; ctx.lineWidth = 3;
                ctx.beginPath();
                const r2 = 15;
                ctx.moveTo(bx + r2, by); ctx.lineTo(bx + bw - r2, by);
                ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + r2);
                ctx.lineTo(bx + bw, by + bh - r2);
                ctx.quadraticCurveTo(bx + bw, by + bh, bx + bw - r2, by + bh);
                ctx.lineTo(bx + r2, by + bh);
                ctx.quadraticCurveTo(bx, by + bh, bx, by + bh - r2);
                ctx.lineTo(bx, by + r2);
                ctx.quadraticCurveTo(bx, by, bx + r2, by);
                ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#fff'; ctx.font = 'bold 22px Arial';
                ctx.fillText('СТАРТ', DW / 2, by + bh / 2);
            }
            
            if (state === STATE.OVER) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, DW, DH);
                ctx.fillStyle = '#f44'; ctx.font = 'bold 28px Arial'; ctx.textAlign = 'center';
                ctx.fillText('УЕН БЕТТЕ!', DW / 2, DH * 0.28);
                ctx.fillStyle = '#fff'; ctx.font = '18px Arial';
                ctx.fillText(`Счёт: ${score}`, DW / 2, DH * 0.40);
                ctx.fillText(`Лучшая серия: x${maxCombo}`, DW / 2, DH * 0.46);
                
                const bw = 180, bh = 54;
                const bx = DW / 2 - bw / 2, by = DH * 0.55;
                ctx.fillStyle = '#f60'; ctx.strokeStyle = '#fa0'; ctx.lineWidth = 3;
                ctx.beginPath();
                const r2 = 15;
                ctx.moveTo(bx + r2, by); ctx.lineTo(bx + bw - r2, by);
                ctx.quadraticCurveTo(bx + bw, by, bx + bw, by + r2);
                ctx.lineTo(bx + bw, by + bh - r2);
                ctx.quadraticCurveTo(bx + bw, by + bh, bx + bw - r2, by + bh);
                ctx.lineTo(bx + r2, by + bh);
                ctx.quadraticCurveTo(bx, by + bh, bx, by + bh - r2);
                ctx.lineTo(bx, by + r2);
                ctx.quadraticCurveTo(bx, by, bx + r2, by);
                ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Arial';
                ctx.fillText('ЯҢАДАН', DW / 2, by + bh / 2);
                
                canvas._gobtn = { x: bx, y: by, w: bw, h: bh };
            }
        }
        
        function loop() { upd(); draw(); requestAnimationFrame(loop); }
        
        rocket.x = DW / 2; rocket.y = DH * 0.5;
        rocket.cf = rocket.fn; rocket.tf = rocket.fn;
        spw(); asgnC();
        loop();
    </script>
</body>
</html>
